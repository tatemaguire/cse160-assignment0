<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Change a point color</title>
  </head>

  <body onload="main()">
    <canvas id="webgl" width="400" height="400">
    Please use a browser that supports "canvas"
    </canvas>
    <br>

    Shape: <select id="tool_selection">
      <option value="point">Point</option>
      <option value="triangle">Triangle</option>
      <option value="circle">Circle</option>
    </select>
    <br>
    <br>

    R<input type="range" id="color_r" min="0" max="1" step="0.001">
    G<input type="range" id="color_g" min="0" max="1" step="0.001">
    B<input type="range" id="color_b" min="0" max="1" step="0.001">
    <br>

    Size<input type="range" id="point_size" min="1" max="100" step="1" value="10">
    <br>
    <br>

    <button id="clear_button">Clear</button>

    <script src="../lib/webgl-utils.js"></script>
    <script src="../lib/webgl-debug.js"></script>
    <script src="../lib/cuon-utils.js"></script>
    <script src="Point.js"></script>
    <script src="Triangle.js"></script>
    <script src="Circle.js"></script>
    <script src="ColoredPoints.js"></script>
  </body>
</html>
